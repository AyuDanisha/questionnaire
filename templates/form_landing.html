<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Questionnaire.Title}} - Questionnaire</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#0a0a0f',
                        fg: '#e8e8ed',
                        muted: '#6b7280',
                        accent: '#00d4aa',
                        card: '#14141f',
                        border: '#2a2a3a',
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Space Grotesk', sans-serif; }
        body { background: #0a0a0f; }
        
        .form-bg {
            background: 
                radial-gradient(ellipse at 50% 0%, rgba(0, 212, 170, 0.08) 0%, transparent 50%),
                linear-gradient(180deg, #0a0a0f 0%, #0f0f18 100%);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4aa 0%, #00a88a 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0, 212, 170, 0.3);
        }
        
        .input-field:focus {
            border-color: #00d4aa;
            box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
        }
        
        .card-glow {
            box-shadow: 0 0 60px rgba(0, 212, 170, 0.05);
        }
    </style>
</head>
<body class="text-fg min-h-screen form-bg">
    <div class="min-h-screen flex flex-col items-center justify-center px-6 py-12">
        <!-- Logo -->
        <div class="mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-accent to-emerald-600 flex items-center justify-center">
                    <svg class="w-6 h-6 text-bg" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                </div>
                <span class="font-display font-semibold text-lg">Business Requirement Collector</span>
            </div>
        </div>
        
        <!-- Card -->
        <div class="w-full max-w-xl bg-card rounded-3xl border border-border p-8 md:p-10 card-glow">
            <div class="text-center mb-8">
                <h1 class="font-display text-2xl md:text-3xl font-bold mb-3">{{.Questionnaire.Title}}</h1>
                <p class="text-muted">{{.Questionnaire.Description}}</p>
            </div>
            
            {{if .Error}}
            <div class="bg-red-500/10 border border-red-500/30 rounded-xl p-4 mb-6">
                <p class="text-red-400 text-sm">{{.Error}}</p>
            </div>
            {{end}}
            
            <form method="POST" action="">
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium mb-2">Nama Lengkap <span class="text-red-400">*</span></label>
                        <input type="text" name="name" required
                            class="input-field w-full px-4 py-3 bg-bg border border-border rounded-xl outline-none text-fg placeholder-muted"
                            placeholder="Masukkan nama lengkap Anda">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Email <span class="text-red-400">*</span></label>
                        <input type="email" name="email" required
                            class="input-field w-full px-4 py-3 bg-bg border border-border rounded-xl outline-none text-fg placeholder-muted"
                            placeholder="email@perusahaan.com">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Nama Perusahaan</label>
                        <input type="text" name="company"
                            class="input-field w-full px-4 py-3 bg-bg border border-border rounded-xl outline-none text-fg placeholder-muted"
                            placeholder="PT. Contoh Perusahaan">
                    </div>
                </div>
                
                <button type="submit" class="btn-primary w-full mt-8 py-4 rounded-xl font-semibold text-bg">
                    Mulai Mengisi Questionnaire
                </button>
            </form>
            
            <div class="mt-6 pt-6 border-t border-border">
                <div class="flex items-center justify-center gap-6 text-sm text-muted">
                    <div class="flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                        <span>Data aman & rahasia</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span>10 pertanyaan/halaman</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

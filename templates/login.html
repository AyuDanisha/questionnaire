<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BRC</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#0a0a0f',
                        fg: '#e8e8ed',
                        muted: '#6b7280',
                        accent: '#00d4aa',
                        card: '#14141f',
                        border: '#2a2a3a',
                    },
                    fontFamily: {
                        display: ['Space Grotesk', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Space Grotesk', sans-serif; }
        body { background: #0a0a0f; }
        
        .auth-bg {
            background: 
                radial-gradient(ellipse at 0% 0%, rgba(0, 212, 170, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 100% 100%, rgba(0, 212, 170, 0.05) 0%, transparent 40%),
                #0a0a0f;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4aa 0%, #00a88a 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0, 212, 170, 0.3);
        }
        
        .input-field {
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            border-color: #00d4aa;
            box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
        }
    </style>
</head>
<body class="text-fg min-h-screen auth-bg">
    <div class="min-h-screen flex items-center justify-center px-6 py-12">
        <div class="w-full max-w-md">
            <!-- Logo -->
            <div class="text-center mb-10">
                <a href="/" class="inline-flex items-center gap-3">
                    <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-accent to-emerald-600 flex items-center justify-center">
                        <svg class="w-7 h-7 text-bg" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                    </div>
                    <span class="font-display font-bold text-2xl">BRC</span>
                </a>
            </div>
            
            <!-- Login Card -->
            <div class="bg-card rounded-2xl border border-border p-8">
                <h1 class="font-display text-2xl font-bold mb-2">Selamat Datang</h1>
                <p class="text-muted mb-8">Masuk ke akun developer Anda</p>
                
                {{if .Registered}}
                <div class="bg-accent/10 border border-accent/30 rounded-xl p-4 mb-6">
                    <p class="text-accent text-sm">Akun berhasil dibuat! Silakan login.</p>
                </div>
                {{end}}
                
                {{if .Error}}
                <div class="bg-red-500/10 border border-red-500/30 rounded-xl p-4 mb-6">
                    <p class="text-red-400 text-sm">{{.Error}}</p>
                </div>
                {{end}}
                
                <form method="POST" action="/login">
                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium mb-2">Email</label>
                            <input type="email" name="email" required
                                class="input-field w-full px-4 py-3 bg-bg border border-border rounded-xl outline-none text-fg placeholder-muted"
                                placeholder="developer@email.com">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium mb-2">Password</label>
                            <input type="password" name="password" required
                                class="input-field w-full px-4 py-3 bg-bg border border-border rounded-xl outline-none text-fg placeholder-muted"
                                placeholder="Masukkan password">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-primary w-full mt-8 py-4 rounded-xl font-semibold text-bg">
                        Login
                    </button>
                </form>
                
                <div class="mt-6 text-center">
                    <p class="text-muted">
                        Belum punya akun? 
                        <a href="/register" class="text-accent hover:underline">Daftar disini</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
